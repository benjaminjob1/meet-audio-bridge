name: Release & Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build .app bundle
        run: |
          npm install -g pkg
          pkg bridge.js --targets node18-macos-x64 --output meet-audio-bridge
          mkdir -p dist
          mv meet-audio-bridge dist/

      - name: Create installer script
        run: |
          cat > dist/install.sh << 'EOF'
          #!/bin/bash
          echo "🎙️ Installing Meet Audio Bridge..."
          mkdir -p ~/meet-audio-bridge
          cp meet-audio-bridge ~/meet-audio-bridge/
          chmod +x ~/meet-audio-bridge/meet-audio-bridge
          echo "✅ Installed! Run with: ~/meet-audio-bridge/meet-audio-bridge <pi-ip>"
          EOF
          chmod +x dist/install.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build binary
        run: |
          npm install -g pkg
          pkg bridge.js --targets node18-linux-x64 --output meet-audio-bridge
          tar -czvf meet-audio-bridge-linux.tar.gz meet-audio-bridge

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: meet-audio-bridge-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}