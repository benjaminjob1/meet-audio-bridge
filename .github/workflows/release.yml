name: Release & Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build .app bundle
        run: |
          pkg bridge.js --targets node18-macos-x64 --output meet-audio-bridge.app
          mkdir -p dist
          mv meet-audio-bridge.app dist/

      - name: Create installer + README
        run: |
          cat > dist/install.sh << 'INSTALL_EOF'
          #!/bin/bash
          echo "🎙️ Meet Audio Bridge Installer"
          echo "=============================="
          echo ""

          # Check if BlackHole is installed
          if [ -d "/Library/Extensions/BlackHole.v" ]; then
            echo "✅ BlackHole audio driver is installed"
          else
            echo "⚠️  BlackHole audio driver is NOT installed"
            echo ""
            echo "BlackHole is required for Meet Audio Bridge to work."
            echo ""

            # Check if brew is available
            if command -v brew &> /dev/null; then
              echo "🍺 Brew detected - would you like to install BlackHole now?"
              echo "   Run: brew install blackhole-2ch"
              echo ""
              read -p "Install BlackHole via brew? (y/n): " -n 1 -r; echo
              if [[ $REPLY =~ ^[Yy]$ ]]; then
                echo "Installing BlackHole..."
                brew install blackhole-2ch
                echo "✅ BlackHole installed!"
                echo "⚠️  You may need to approve in System Settings > Privacy & Security"
              else
                echo "Skipping BlackHole install."
              fi
            else
              echo "❌ Brew not found - manual installation required."
              echo ""
              read -p "Open BlackHole download page? (y/n): " -n 1 -r; echo
              if [[ $REPLY =~ ^[Yy]$ ]]; then
                open "https://existential.audio/blackhole/"
              fi
            fi
          fi

          echo ""
          echo "📦 Installing Meet Audio Bridge..."
          mkdir -p ~/meet-audio-bridge
          cp -R meet-audio-bridge.app ~/meet-audio-bridge/
          chmod +x ~/meet-audio-bridge/meet-audio-bridge.app/Contents/MacOS/meet-audio-bridge
          echo "✅ Installed to ~/meet-audio-bridge/meet-audio-bridge.app"
          echo ""
          echo "💡 Run: open ~/meet-audio-bridge/meet-audio-bridge.app"
          echo ""
          echo "⚠️  After first run, grant microphone access if prompted."
          INSTALL_EOF
          chmod +x dist/install.sh
          
          cat > dist/README.txt << 'README_EOF'
          Meet Audio Bridge - macOS
          ===========================
          1. Install BlackHole: https://existential.audio/blackhole/
             - Or run: brew install blackhole-2ch (if brew installed)
          2. Run: open meet-audio-bridge.app
          3. Enter Pi Tailscale IP when prompted
          4. In Google Meet, use BlackHole as microphone
          README_EOF

      - name: Create zip for release
        run: |
          cd dist && zip -r meet-audio-bridge.app.zip meet-audio-bridge.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Meet Audio Bridge" \
            --window-size 500 350 \
            "dist/Meet-Audio-Bridge.dmg" \
            "dist/meet-audio-bridge.app/"
          ls -la dist/

      - name: Upload all files to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meet-audio-bridge.app.zip
            dist/Meet-Audio-Bridge.dmg
            dist/install.sh
            dist/README.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies + pkg
        run: |
          npm install
          npm install -g pkg

      - name: Build binary
        run: |
          pkg bridge.js --targets node18-linux-x64 --output meet-audio-bridge
          tar -czvf meet-audio-bridge-linux.tar.gz meet-audio-bridge

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: meet-audio-bridge-linux.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}